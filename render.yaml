services:
  # Frontend (React Static Site)
  - type: web
    name: networking-sdr-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - path: /
        singlePage: true

  # Backend (FastAPI Web Service)
  - type: web
    name: networking-sdr-api
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: OPENAI_API_KEY
        sync: false
      - key: LYZR_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: QDRANT_URL
        value: :memory:
      - key: QDRANT_API_KEY
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Networking_SDR_Leads
      - key: GOOGLE_CREDENTIALS_FILE
        value: credentials.json
