# Render Blueprint - Deploy both services with one click
services:
  # Backend API Service
  - type: web
    name: networking-sdr-api
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: OPENAI_API_KEY
        sync: false
      - key: LYZR_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: QDRANT_URL
        value: ":memory:"

  # Frontend Static Site
  - type: web
    name: networking-sdr-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - path: /
        singlePage: true
